name: Quality CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scripts:
    name: Test task scripts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 18.20.8

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt -r requirements-dev.txt

      - name: Check Python environment
        run: python -m pip check

      - name: Check Python syntax
        run: python -m compileall -q scripts templates utils tests tools

      - name: Run Python tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Check JavaScript syntax
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find scripts templates utils tests -type f -name '*.js' -print0)

      - name: Run JavaScript tests
        run: node --test tests/*.test.js

      - name: Check repository metadata
        run: python tools/check_repository_consistency.py

      - name: Audit Python dependencies
        run: pip-audit --strict -r requirements.txt

  docs:
    name: Build documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_BASE_PATH: /QLscript
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run types:check

      - name: Build static site
        run: npm run build

      - name: Audit dependencies
        run: npm audit

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/out

  deploy:
    name: Deploy docs to GitHub Pages
    if: github.event_name == 'push'
    needs:
      - scripts
      - docs
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Set up GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
